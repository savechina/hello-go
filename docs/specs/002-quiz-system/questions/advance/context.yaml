- question: "Context.Done() 返回的 channel 在 context 取消时会 close"
  options:
    - "正确"
    - "错误"
  answer: 0
  explanation: "当 context 被取消（cancel 调用、超时、截止）时，Done() 返回的 channel 会被关闭。goroutine 通过 select 监听此 channel 来判断何时退出。这是 context 取消传播的核心机制。"
  type: true-false

- question: "withTimeout 和 withCancel 的区别是什么？"
  options:
    - "withTimeout 自动在指定时间后取消 context，withCancel 需要手动调用 cancel 函数"
    - "withTimeout 不能传递子 context，withCancel 可以"
    - "withTimeout 返回的 error 是 context.DeadlineExceeded，withCancel 返回 nil"
    - "两者功能完全相同，只是参数不同"
  answer: 0
  explanation: "context.WithTimeout(parent, duration) 内部自动创建计时器，超时后自动调用 cancel。context.WithCancel(parent) 需要手动调用返回的 cancel 函数来触发取消。两者都返回 (Context, CancelFunc)。"
  type: multiple-choice

- question: "以下代码中，哪个 context 会最先触发 Done()？\n\n```go\nctx := context.Background()\nctx1, cancel1 := context.WithCancel(ctx)\nctx2, _ := context.WithTimeout(ctx1, 5*time.Second)\nctx3, cancel3 := context.WithCancel(ctx2)\ncancel1()\n```"
  options:
    - "只有 ctx1 的 Done() 会触发"
    - "ctx1、ctx2、ctx3 的 Done() 都会触发"
    - "只有 ctx1 和 ctx2 的 Done() 会触发"
    - "三个都不会触发，因为 cancel1 没有传入 ctx3"
  answer: 1
  explanation: "Context 呈树状结构：Background → ctx1 → ctx2 → ctx3。当父 context（ctx1）被取消时，所有子孙 context（ctx2、ctx3）都会级联取消。这是 context 取消传播的树状传播机制。"
  type: multiple-choice
